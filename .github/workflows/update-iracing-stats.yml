name: Update iRacing Stats

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install iracingdataapi

      - name: Run updater
        env:
          IRACING_EMAIL: ${{ secrets.IRACING_EMAIL }}
          IRACING_PASSWORD: ${{ secrets.IRACING_PASSWORD }}
        run: |
          python update_iracing_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "Aetherwing Stats Bot"
          git config user.email "aetherwing-stats-bot@users.noreply.github.com"
          git add iracing-stats.json
          git commit -m "Update iRacing stats" || echo "No changes to commit"
          git push